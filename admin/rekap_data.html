<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekap Absensi Bulanan</title>
<link rel="stylesheet" href="../cssFolder/rekap_data.css"/>
</head>

<body>


<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header" style="text-align: center; margin-bottom: 25px;">
    <div style="width: 50px; height: 50px; background: linear-gradient(135deg, #3b82f6, #6366f1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold; margin: 0 auto 10px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);">SS</div>
    <h2 style="font-size: 1.2rem; color: #1e293b !important; margin: 0; font-weight: 700;">Smart <span style="color: #3b82f6;">Saga</span></h2>
    <div id="hello-user" style="font-size: 0.85rem; color: #64748b; font-weight: 500; margin-top: 5px;">Admin Panel</div>
  </div>

  <a href="admin.html">📊 Dashboard</a>
  <a href="kartu.html">➕ Kartu Siswa</a>
  <a href="tambah_user.html">👤 Tambah Pengguna</a>
  <a href="izin.html">📄 Izin Siswa</a>
  <a href="management_users.html">👥 Manajemen Pengguna</a>
  <a href="rekap_data.html">📂 Rekap Data</a>
  <a href="setting_jam.html">⏰ Setting Jam</a>

  <!-- LOGOUT -->
  <div class="sidebar-bottom">
    <a href="login.html" class="" onclick="logout()">🚪 Logout</a>
  </div>
</div>

<div class="content">

  <div class="navbar">
    <h2>📅 Rekap Absensi Bulanan</h2>
    <span id="jam"></span>
  </div>

  <div class="container">

    <!-- FILTER -->
    <div class="filter-box">
        <button onclick="exportExcel()" class="btn-export">🔄 Export Excel</button>
      <select id="bulan">
        <option value="0">Semua Bulan</option>
        <option value="1">Januari</option>
        <option value="2">Februari</option>
        <option value="3">Maret</option>
        <option value="4">April</option>
        <option value="5">Mei</option>
        <option value="6">Juni</option>
        <option value="7">Juli</option>
        <option value="8">Agustus</option>
        <option value="9">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
      </select>

      <select id="tahun">
        <option>2025</option>
        <option selected>2026</option>
      </select>
    </div>

    <!-- TABLE -->
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Kelas</th>
            <th>Tanggal</th>
            <th>Jam</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tabel-data"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="../jsScript/rekap_data.js"></script>

</body>
</html>
