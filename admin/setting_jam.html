<!-- CONTENT -->
<div class="content">

  <div class="navbar">⏰ Setting Jam & Statistik</div>

  <div class="container">

    <div class="grid">

      <!-- SETTING JAM -->
      <div class="card">
        <h3>Setting Jam</h3>

        <input type="time" id="jamMasuk">
        <input type="time" id="jamPulang">

        <button onclick="saveJam()">💾 Simpan</button>
      </div>

      <!-- STATISTIK -->
      <div class="card">
        <h3>Statistik Hari Ini</h3>

        <div class="stats">
          <div class="stat-box">
            <h3 id="hadir">0</h3>
            <p>Hadir</p>
          </div>
          <div class="stat-box">
            <h3 id="izin">0</h3>
            <p>Izin</p>
          </div>
          <div class="stat-box">
            <h3 id="alpha">0</h3>
            <p>Alpha</p>
          </div>
        </div>

        <canvas id="chartAbsensi"></canvas>
      </div>

    </div>

  </div>

</div>
